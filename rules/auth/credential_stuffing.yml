title: Credential Stuffing — High Volume Login Failures
id: AUTHDET-003
status: stable
description: |
  High-volume failed login attempts indicative of automated credential stuffing
  using breach databases. Distinguished from password spray by raw event volume
  rather than user breadth.
author: authdetect
date: 2025-01-01
logsource:
  category: authentication
detection:
  selection:
    status_code: [401]
    path|contains: login
  condition: selection | count(src_ip) > 20
  timeframe: 300s
level: critical
mitre_attack:
  tactics: [credential-access]
  techniques: [T1110.004]
references:
  - cwe: CWE-307
  - url: https://attack.mitre.org/techniques/T1110/004/
false_positives:
  - Misconfigured SSO / identity provider replaying requests
tags: [attack.credential_access, attack.t1110.004]
