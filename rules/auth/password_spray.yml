title: Password Spray Attack
id: AUTHDET-002
status: stable
description: |
  Password spraying: one or a small number of passwords tried against many
  different accounts from the same source. Unlike brute force (many attempts
  against one account), spraying stays under per-account lockout thresholds
  while still achieving broad coverage.

  Key signal: high number of DISTINCT failed users from a single IP over a
  moderate time window.

author: authdetect
date: 2025-01-01

logsource:
  category: authentication

detection:
  selection:
    status_code:
      - 401
  condition: selection | count(user) > 8
  timeframe: 300s

level: high

mitre_attack:
  tactics:
    - credential-access
  techniques:
    - T1110.003   # Brute Force: Password Spraying

references:
  - cwe: CWE-307
  - owasp: "A07:2021 – Identification and Authentication Failures"
  - url: https://attack.mitre.org/techniques/T1110/003/

false_positives:
  - Misconfigured application or service reusing stale credentials for many users
  - Bulk account migration with wrong password policy

tags:
  - attack.credential_access
  - attack.t1110.003
